<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Asistente Operativo</title>

    <style>

        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
            font-family:Arial,sans-serif;
        }

        body{
            background:#111;
            color:white;
            padding:15px;
        }

        h1{
            margin-bottom:15px;
            font-size:26px;
        }

        .card{
            background:#1d1d1d;
            border-radius:16px;
            padding:15px;
            margin-bottom:15px;
        }

        .label{
            color:#999;
            margin-bottom:5px;
            font-size:14px;
        }

        .value{
            font-size:18px;
            font-weight:bold;
        }

        #estado{
            margin-top:10px;
            color:#00ffcc;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:#00b894;
            color:white;
            font-size:18px;
            font-weight:bold;
            margin-top:10px;
        }

        .sitio{
            background:#222;
            border-left:5px solid #00b894;
            padding:12px;
            border-radius:12px;
            margin-top:10px;
        }

    </style>

</head>

<body>

    <h1>🚚 Asistente Operativo</h1>

    <div class="card">
        <div class="label">Estado</div>
        <div class="value" id="estado">
            Esperando activación...
        </div>
    </div>

    <div class="card">
        <div class="label">Último comando</div>
        <div class="value" id="comando">
            ---
        </div>
    </div>

    <div class="card">
        <div class="label">Sitio actual</div>
        <div class="value" id="sitioActual">
            ---
        </div>
    </div>

    <div class="card">
        <div class="label">Información</div>
        <div class="value" id="info">
            ---
        </div>
    </div>

    <div class="card">

        <div class="label">
            Sitios guardados
        </div>

        <div id="listaSitios"></div>

    </div>

    <button onclick="activarAsistente()">
        🎤 Activar Asistente
    </button>

    <script>

        //////////////////////////////////////
        // BASE LOCAL
        //////////////////////////////////////

        let sitios =
            JSON.parse(
                localStorage.getItem("sitios")
            ) || [];

        //////////////////////////////////////
        // VARIABLES
        //////////////////////////////////////

        let miLat = 0;
        let miLng = 0;

        let recognition;

        let escuchando = false;

        let hablando = false;

        let modoGuardar = false;

        let sitioTemporal = null;

        //////////////////////////////////////
        // GPS
        //////////////////////////////////////

        navigator.geolocation.watchPosition(

            (pos)=>{

                miLat = pos.coords.latitude;
                miLng = pos.coords.longitude;

            },

            (err)=>{

                console.log(err);

            },

            {
                enableHighAccuracy:true,
                maximumAge:0,
                timeout:5000
            }

        );

        //////////////////////////////////////
        // HABLAR
        //////////////////////////////////////

        function hablar(texto){

            hablando = true;

            if(recognition){

                recognition.stop();

            }

            const voz =
                new SpeechSynthesisUtterance(texto);

            voz.lang = "es-CL";

            voz.rate = 1;

            voz.pitch = 1;

            voz.onend = ()=>{

                hablando = false;

                if(escuchando){

                    setTimeout(()=>{

                        try{

                            recognition.start();

                        }catch(e){}

                    },500);

                }

            };

            speechSynthesis.speak(voz);

        }

        //////////////////////////////////////
        // VIBRAR
        //////////////////////////////////////

        function vibrar(){

            if(navigator.vibrate){

                navigator.vibrate([300,100,300]);

            }

        }

        //////////////////////////////////////
        // RENDER
        //////////////////////////////////////

        function renderSitios(){

            const lista =
                document.getElementById(
                    "listaSitios"
                );

            lista.innerHTML = "";

            sitios.forEach((s)=>{

                const div =
                    document.createElement("div");

                div.className = "sitio";

                div.innerHTML = `
                    <b>${s.nombre}</b>
                    <br>
                    ${s.info}
                `;

                lista.appendChild(div);

            });

        }

        renderSitios();

        //////////////////////////////////////
        // ACTIVAR ASISTENTE
        //////////////////////////////////////

        function activarAsistente(){

            const SpeechRecognition =
                window.SpeechRecognition ||
                window.webkitSpeechRecognition;

            if(!SpeechRecognition){

                alert(
                    "Navegador no soporta voz"
                );

                return;
            }

            recognition =
                new SpeechRecognition();

            recognition.lang = "es-CL";

            recognition.continuous = true;

            recognition.interimResults = false;

            escuchando = true;

            recognition.start();

            document.getElementById(
                "estado"
            ).innerText =
                "🎧 Escucha continua";

            ////////////////////////////////////
            // RESULTADO
            ////////////////////////////////////

            recognition.onresult = (event)=>{

                if(hablando) return;

                const texto =
                    event.results[
                        event.results.length - 1
                    ][0].transcript
                    .toLowerCase()
                    .trim();

                //////////////////////////////////
                // ACTIVADOR
                //////////////////////////////////

                if(
                    !texto.includes("asistente")
                ) return;

                const comando =
                    texto
                    .replace("asistente","")
                    .trim();

                document.getElementById(
                    "comando"
                ).innerText = comando;

                procesarComando(comando);

            };

            ////////////////////////////////////
            // ERROR
            ////////////////////////////////////

            recognition.onerror = ()=>{

                document.getElementById(
                    "estado"
                ).innerText =
                    "⚠️ Reiniciando...";

            };

            ////////////////////////////////////
            // FIN
            ////////////////////////////////////

            recognition.onend = ()=>{

                if(
                    escuchando &&
                    !hablando
                ){

                    setTimeout(()=>{

                        try{

                            recognition.start();

                        }catch(e){}

                    },1000);

                }

            };

        }

        //////////////////////////////////////
        // PROCESAR
        //////////////////////////////////////

        function procesarComando(texto){

            ////////////////////////////////////
            // GUARDAR SITIO
            ////////////////////////////////////

            if(
                texto.startsWith(
                    "guardar sitio"
                )
            ){

                const nombre =
                    texto.replace(
                        "guardar sitio",
                        ""
                    ).trim();

                if(!nombre){

                    hablar(
                        "Debes indicar nombre"
                    );

                    return;
                }

                sitioTemporal = {

                    nombre:nombre,

                    lat:miLat,

                    lng:miLng,

                    info:"Sin información"

                };

                modoGuardar = true;

                document.getElementById(
                    "sitioActual"
                ).innerText = nombre;

                hablar(
                    "Sitio creado. Dicta una nota."
                );

                return;

            }

            ////////////////////////////////////
            // AGREGAR NOTA
            ////////////////////////////////////

            if(
                modoGuardar &&
                texto.startsWith("nota")
            ){

                const nota =
                    texto.replace(
                        "nota",
                        ""
                    ).trim();

                sitioTemporal.info = nota;

                hablar(
                    "Nota agregada. Di guardar."
                );

                document.getElementById(
                    "info"
                ).innerText = nota;

                return;

            }

            ////////////////////////////////////
            // CONFIRMAR GUARDADO
            ////////////////////////////////////

            if(
                modoGuardar &&
                texto === "guardar"
            ){

                sitios.push(sitioTemporal);

                localStorage.setItem(
                    "sitios",
                    JSON.stringify(sitios)
                );

                renderSitios();

                hablar(
                    "Sitio guardado correctamente"
                );

                vibrar();

                modoGuardar = false;

                sitioTemporal = null;

                return;

            }

            ////////////////////////////////////
            // MOSTRAR SITIOS
            ////////////////////////////////////

            if(
                texto.includes(
                    "mostrar sitios"
                )
            ){

                hablar(
                    "Tienes " +
                    sitios.length +
                    " sitios guardados"
                );

                return;

            }

            ////////////////////////////////////
            // BUSCAR SITIO
            ////////////////////////////////////

            const encontrado =
                sitios.find(s=>

                    texto.includes(
                        s.nombre.toLowerCase()
                    )

                );

            if(encontrado){

                document.getElementById(
                    "sitioActual"
                ).innerText =
                    encontrado.nombre;

                document.getElementById(
                    "info"
                ).innerText =
                    encontrado.info;

                hablar(
                    encontrado.info
                );

                vibrar();

                return;

            }

            ////////////////////////////////////
            // NO ENTENDIDO
            ////////////////////////////////////

            hablar(
                "No entendí el comando"
            );

        }

        //////////////////////////////////////
        // MENSAJE INICIAL
        //////////////////////////////////////

        hablar(
            "Asistente operativo iniciado"
        );

    </script>

</body>

</html>
